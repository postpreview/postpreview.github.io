<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – PostPreview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
</head>
<body>

<div id="header-component"></div>

<section class="hero" style="padding: 100px 5% 60px;">
  <div class="hero-glow"></div>
  <div class="hero-badge">Get in Touch</div>
  <h1 class="animate">Questions? <span class="gradient-text">Reach Out.</span></h1>
  <p class="animate delay-1">Have feedback or a feature request? I'd love to hear from you.</p>
</section>

<section class="preview-section">
  <div class="container">
    <div class="preview-layout" style="max-width: 900px; margin: 0 auto; grid-template-columns: 1fr 1fr;">
      
      <div class="animate delay-2">
        <h2 class="section-title">Contact Information</h2>
        <p class="section-sub" style="margin-bottom: 32px;">Feel free to drop an email for collaborations or support.</p>
        
        <div class="feature-card" style="margin-bottom: 20px;">
            <div class="feature-icon" style="font-size: 20px;">📧</div>
            <div class="feature-title">Email</div>
            <a href="mailto:aansawaqas50@gmail.com" class="feature-text" style="color: var(--accent2); text-decoration: none;">aansawaqas50@gmail.com</a>
        </div>
      </div>

      <div class="input-panel animate delay-3">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" placeholder="Your Name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="Email Address" />
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea class="form-textarea" style="height: 120px;" placeholder="How can I help?"></textarea>
        </div>
        <button class="btn btn-primary" style="width: 100%; justify-content: center;">Send Message</button>
      </div>

    </div>
  </div>
</section>

<div id="footer-component"></div>

<script src="components/header.js"></script>
<script src="components/footer.js"></script>
</body>
</html>
